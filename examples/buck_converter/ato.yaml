requires-atopile: ^0.14.0

paths:
  src: ./
  layout: ./layouts

builds:
  default:
    entry: buck_converter.ato:TPS54560_Reference
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
  usage:
    entry: buck_converter.ato:Usage
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
  model-validation:
    entry: model-validation.ato:ModelValidation
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
  design-validation:
    entry: design-validation.ato:DesignValidation
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
dependencies:
- type: registry
  identifier: atopile/indicator-leds
  release: 0.2.3
