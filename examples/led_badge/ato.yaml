requires-atopile: ^0.14.0

paths:
  src: .
  layout: ./layouts

builds:
  badge:
    entry: led_badge.ato:LED_BADGE
    hide_designators: true
    exclude_checks: [PCB.requires_drc_check]
  strip10:
    entry: led_badge.ato:OPSCO_SK6805_EC20_strip10
    exclude_checks: [PCB.requires_drc_check]
  grid10x10:
    entry: led_badge.ato:OPSCO_SK6805_EC20_grid10x10
    exclude_checks: [PCB.requires_drc_check]

dependencies:
- type: registry
  identifier: atopile/buttons
  release: 0.4.0
- type: registry
  identifier: atopile/ti-tlv75901
  release: 0.4.0
- type: registry
  identifier: atopile/usb-connectors
  release: 0.4.1
- type: registry
  identifier: atopile/addressable-leds
  release: 0.2.6
- type: registry
  identifier: atopile/microphones
  release: 0.2.1
- type: registry
  identifier: atopile/st-lsm6ds3
  release: 0.2.0
- type: registry
  identifier: atopile/espressif-esp32-c3
  release: 0.3.0
- type: registry
  identifier: atopile/ti-tps563201
  release: 0.1.9
- type: registry
  identifier: atopile/ti-tps63020
  release: 0.3.0
- type: registry
  identifier: atopile/ti-bq25185
  release: 0.3.0
- type: registry
  identifier: atopile/batteries
  release: 0.2.3
- type: registry
  identifier: atopile/logos
  release: 0.2.0
