<!-- Loading overlay injected by apply-branding.sh -->
<style>
#ato-loading{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:#0c1118;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease}
#ato-loading.hidden{opacity:0;pointer-events:none}
#ato-loading canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.ato-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(249,80,21,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(249,80,21,.04) 1px,transparent 1px);background-size:48px 48px}
.ato-glow{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);width:700px;height:500px;background:radial-gradient(ellipse at center,rgba(249,80,21,.08) 0%,transparent 65%);pointer-events:none}
.ato-logo{position:relative;width:72px;height:72px;filter:drop-shadow(0 0 24px rgba(249,80,21,.35));animation:ato-levitate 5s ease-in-out infinite}
@keyframes ato-levitate{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.ato-terminal{position:relative;width:100%;max-width:420px;margin-top:2rem;background:#131b24;border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;z-index:1}
.ato-term-bar{display:flex;align-items:center;gap:5px;padding:.55rem .85rem;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)}
.ato-term-dot{width:9px;height:9px;border-radius:50%}
.ato-td-r{background:#ff5f57}.ato-td-y{background:#febc2e}.ato-td-g{background:#28c840}
.ato-term-title{margin-left:auto;font-size:.65rem;color:#6b7a8d;letter-spacing:.05em;font-family:monospace}
.ato-term-body{padding:.75rem 1rem;font-family:monospace;font-size:.75rem;line-height:1.9;min-height:4.5rem}
.ato-term-line{display:flex;gap:.5rem;opacity:0;animation:ato-line-in .35s ease forwards}
@keyframes ato-line-in{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
.ato-term-prompt{color:#f95015;user-select:none}
.ato-term-text{color:#dde6f0}
.ato-term-text.dim{color:#6b7a8d}
</style>
<script>
(function(){
  /* ── Overlay removal: wait for the Layout editor tab ── */
  var obs=new MutationObserver(function(){
    var tabs=document.querySelectorAll('.tab');
    for(var i=0;i<tabs.length;i++){
      if((tabs[i].textContent||'').indexOf('Layout')!==-1){
        obs.disconnect();
        setTimeout(function(){
          var el=document.getElementById('ato-loading');
          if(el){el.classList.add('hidden');el.addEventListener('transitionend',function(){el.remove()});setTimeout(function(){if(el.parentNode)el.remove()},1000)}
        },500);
        return;
      }
    }
  });
  obs.observe(document.documentElement,{childList:true,subtree:true});
  setTimeout(function(){var el=document.getElementById('ato-loading');if(el){el.classList.add('hidden');setTimeout(function(){if(el.parentNode)el.remove()},500)}},30000);

  /* ── Fake terminal progress messages ── */
  var MSGS=[
    'Initializing workspace...',
    'Starting language server...',
    'Connecting to backend...',
    'Loading PCB layout...',
    'Rendering board...'
  ];
  var msgIdx=0;
  function addTermLine(){
    var body=document.getElementById('ato-term-body');
    if(!body||msgIdx>=MSGS.length)return;
    var line=document.createElement('div');
    line.className='ato-term-line';
    var prompt=document.createElement('span');
    prompt.className='ato-term-prompt';
    prompt.textContent='$';
    var msg=document.createElement('span');
    msg.className=msgIdx>0?'ato-term-text dim':'ato-term-text';
    msg.textContent=' '+MSGS[msgIdx];
    line.appendChild(prompt);
    line.appendChild(msg);
    body.appendChild(line);
    body.scrollTop=body.scrollHeight;
    msgIdx++;
    if(msgIdx<MSGS.length)setTimeout(addTermLine,900);
  }
  (function waitForTerm(){
    if(!document.getElementById('ato-term-body')){requestAnimationFrame(waitForTerm);return}
    setTimeout(addTermLine,400);
  })();

  /* ── PCB-trace snake animation (from playground spawner) ── */
  (function waitForCanvas(){
    var C=document.getElementById('ato-canvas');
    if(!C){requestAnimationFrame(waitForCanvas);return}
    var X=C.getContext('2d'),G=48,NUM=6,DX=[1,0,-1,0],DY=[0,1,0,-1],snakes=[];
    function nc(){return Math.ceil(C.width/G)+2}
    function nr(){return Math.ceil(C.height/G)+2}
    function resize(){C.width=C.offsetWidth;C.height=C.offsetHeight}
    function pickDir(gx,gy,ex){var c=nc(),r=nr(),o=[];for(var d=0;d<4;d++){if(d===ex)continue;var tx=gx+DX[d],ty=gy+DY[d];if(tx>=0&&tx<c&&ty>=0&&ty<r)o.push(d)}return o}
    function makeSnake(){var c=nc(),r=nr(),gx=Math.floor(Math.random()*c),gy=Math.floor(Math.random()*r),dirs=pickDir(gx,gy,-1),dir=dirs[Math.floor(Math.random()*dirs.length)];return{gx:gx,gy:gy,dir:dir,pts:[[gx*G,gy*G]],len:12+Math.floor(Math.random()*8),speed:.45+Math.random()*.5,alpha:.30+Math.random()*.2,t:0,runway:4+Math.floor(Math.random()*8)}}
    function stepSnake(s){s.gx+=DX[s.dir];s.gy+=DY[s.dir];var c=nc(),r=nr();if(s.gx<0||s.gx>=c||s.gy<0||s.gy>=r)return false;s.pts.push([s.gx*G,s.gy*G]);if(s.pts.length>s.len+1)s.pts.shift();s.runway--;var rev=(s.dir+2)%4,cw=(s.dir+1)%4,ccw=(s.dir+3)%4,fwd=s.gx+DX[s.dir]>=0&&s.gx+DX[s.dir]<c&&s.gy+DY[s.dir]>=0&&s.gy+DY[s.dir]<r;if(!fwd||(s.runway<=0&&Math.random()<.5)){var opts=[];[cw,ccw].forEach(function(d){var tx=s.gx+DX[d],ty=s.gy+DY[d];if(tx>=0&&tx<c&&ty>=0&&ty<r)opts.push(d)});if(fwd)opts.push(s.dir);if(!opts.length)opts=pickDir(s.gx,s.gy,rev);if(!opts.length)return false;s.dir=opts[Math.floor(Math.random()*opts.length)];s.runway=4+Math.floor(Math.random()*9)}return true}
    function updateSnake(s,dt){s.t+=s.speed*dt;while(s.t>=1){s.t-=1;if(!stepSnake(s))return makeSnake()}return s}
    function drawSnake(s){if(s.pts.length<1)return;var last=s.pts[s.pts.length-1],hx=last[0]+DX[s.dir]*s.t*G,hy=last[1]+DY[s.dir]*s.t*G,pts=s.pts.slice();pts.push([hx,hy]);var n=pts.length;X.lineWidth=1.5;X.lineCap='square';for(var i=1;i<n;i++){var a=Math.pow(i/(n-1),1.8)*s.alpha;X.strokeStyle='rgba(249,80,21,'+a.toFixed(3)+')';X.beginPath();X.moveTo(pts[i-1][0],pts[i-1][1]);X.lineTo(pts[i][0],pts[i][1]);X.stroke()}X.fillStyle='rgba(249,80,21,'+Math.min(s.alpha*1.8,.8).toFixed(3)+')';X.beginPath();X.arc(hx,hy,2,0,6.2832);X.fill()}
    resize();window.addEventListener('resize',resize);
    for(var i=0;i<NUM;i++){var s=makeSnake();for(var j=0;j<20+Math.floor(Math.random()*40);j++)stepSnake(s);snakes.push(s)}
    var last=0;
    function frame(ts){if(!document.getElementById('ato-loading'))return;requestAnimationFrame(frame);var dt=Math.min((ts-last)/1000,.05);last=ts;X.clearRect(0,0,C.width,C.height);for(var i=0;i<snakes.length;i++){snakes[i]=updateSnake(snakes[i],dt);drawSnake(snakes[i])}}
    requestAnimationFrame(frame);
  })();
})();
</script>
