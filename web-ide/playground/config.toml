[server]
host = "0.0.0.0"
port = 8080
cookie_name = "session"
cookie_max_age_seconds = 3600
cleanup_interval_seconds = 300
pool_check_interval_seconds = 30
max_idle_seconds = 1800
max_lifetime_seconds = 3600
revalidate_seconds = 60
auto_build_frontend = true

[pool]
strategy = "relative"
target_n = 50
max_machine_count = 20

[infra.spawner]
app = "atopile-playground"
primary_region = "sjc"
dockerfile = "Dockerfile"

[infra.spawner.http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[infra.spawner.vm]
cpu_kind = "shared"
cpus = 1
memory_mb = 256

[infra.ws]
app = "atopile-ws"
region = "sjc"
image = "registry.fly.io/atopile-ws:latest"
machines_api = "https://api.machines.dev"
machine_wait_timeout_seconds = 60
machine_wait_retries = 3
dockerfile = "../Dockerfile"
image_label = "latest"
deploy_strategy = "immediate"
deploy_ha = false

[infra.ws.machine.vm]
cpu_kind = "performance"
cpus = 1
memory_mb = 2048

[infra.ws.machine.restart]
policy = "on-failure"
max_retries = 3
