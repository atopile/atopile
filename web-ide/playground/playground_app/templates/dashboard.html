<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>atopile playground dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/png" href="/favicon.png?v=2" />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c1118;
    --surface: #131b24;
    --border: rgba(255,255,255,0.08);
    --text: #dde6f0;
    --muted: #7f8ea1;
    --accent: #f95015;
    --active: #f95015;
    --warm: #f7b731;
    --total: #2ad6c4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: radial-gradient(ellipse at top, rgba(249,80,21,0.1), transparent 45%), var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(12,17,24,0.85);
    backdrop-filter: blur(6px);
  }
  .title {
    font-family: 'Barlow', sans-serif;
    letter-spacing: 0.02em;
    font-size: 1.25rem;
  }
  .title span { color: var(--accent); }
  .header-links { display: inline-flex; gap: 0.6rem; align-items: center; }
  .header-links a {
    text-decoration: none;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.02);
  }
  .header-links a:hover {
    color: var(--text);
    border-color: rgba(255,255,255,0.2);
  }
  main {
    width: min(1080px, 100%);
    margin: 0 auto;
    padding: 1.1rem;
    display: grid;
    gap: 0.9rem;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.9rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 0.95rem;
  }
  .card-label {
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .card-value {
    font-family: 'Barlow', sans-serif;
    font-size: 1.8rem;
    line-height: 1;
  }
  .card-value.active { color: var(--active); }
  .card-value.warm { color: var(--warm); }
  .card-value.total { color: var(--total); }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.65rem;
  }
  .range-group {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
  }
  .range-button {
    border: 1px solid var(--border);
    border-radius: 5px;
    background: rgba(255,255,255,0.02);
    color: var(--muted);
    padding: 0.38rem 0.62rem;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  .range-button.active {
    color: var(--accent);
    border-color: rgba(249,80,21,0.45);
    background: rgba(249,80,21,0.12);
  }
  .meta {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem;
  }
  .legend {
    display: inline-flex;
    gap: 1rem;
    margin-bottom: 0.65rem;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .legend-item { display: inline-flex; align-items: center; gap: 0.35rem; }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    transform: rotate(45deg);
  }
  .legend-dot.active { background: var(--active); }
  .legend-dot.warm { background: var(--warm); }
  .legend-dot.total { background: var(--total); }
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 360px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
    background:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
      #10161f;
    background-size: 100% 20%, 8% 100%, auto;
  }
  #chart {
    display: block;
    width: 100%;
    height: 100%;
  }
  #error {
    color: #f87171;
    font-size: 0.8rem;
    min-height: 1.2em;
    margin-top: 0.65rem;
  }
  @media (max-width: 860px) {
    .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .chart-wrap { height: 300px; }
  }
</style>
</head>
<body>
<header>
  <h1 class="title">Playground <span>Dashboard</span></h1>
  <div class="header-links">
    <a href="/">launcher</a>
    <a href="https://atopile.io/docs">docs</a>
  </div>
</header>

<main>
  <section class="stats">
    <article class="card">
      <div class="card-label">Active</div>
      <div class="card-value active" id="active-value">-</div>
    </article>
    <article class="card">
      <div class="card-label">Warm</div>
      <div class="card-value warm" id="warm-value">-</div>
    </article>
    <article class="card">
      <div class="card-label">Total</div>
      <div class="card-value total" id="total-value">-</div>
    </article>
    <article class="card">
      <div class="card-label">Max</div>
      <div class="card-value" id="max-value">-</div>
    </article>
  </section>

  <section class="toolbar">
    <div class="range-group">
      <button class="range-button" data-window="900">15m</button>
      <button class="range-button active" data-window="3600">1h</button>
      <button class="range-button" data-window="21600">6h</button>
      <button class="range-button" data-window="86400">24h</button>
    </div>
    <div class="meta" id="updated-at">updated: -</div>
  </section>

  <section class="chart-card">
    <div class="legend">
      <div class="legend-item"><span class="legend-dot active"></span>active</div>
      <div class="legend-item"><span class="legend-dot warm"></span>warm</div>
      <div class="legend-item"><span class="legend-dot total"></span>total</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div id="error"></div>
  </section>
</main>

<script src="/static/dashboard.js" defer></script>
</body>
</html>
